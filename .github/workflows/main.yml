name: AI News Bot

on:
  schedule:
      # تشغيل كل 15 دقيقة تلقائياً
          - cron: '*/15 * * * *'
            workflow_dispatch: # يسمح لك بتشغيل البوت يدوياً للتجربة

            jobs:
              build:
                  runs-on: ubuntu-latest
                      permissions:
                            contents: write # ضروري للسماح للبوت بحفظ حالة المقالات المرسلة

                                steps:
                                      - name: Checkout code
                                              uses: actions/checkout@v4

                                                    - name: Set up Python
                                                            uses: actions/setup-python@v5
                                                                    with:
                                                                              python-version: '3.10'

                                                                                    - name: Install dependencies
                                                                                            run: |
                                                                                                      pip install feedparser requests deep-translator
                                                                                                      
                                                                                                            - name: Run Bot
                                                                                                                    run: python bot_github_actions.py
                                                                                                                    
                                                                                                                          - name: Save sent articles state
                                                                                                                                  run: |
                                                                                                                                            git config --local user.email "action@github.com"
                                                                                                                                                      git config --local user.name "GitHub Action"
                                                                                                                                                                touch sent_articles.txt
                                                                                                                                                                          git add sent_articles.txt
                                                                                                                                                                                    git commit -m "Update sent articles [skip ci]" || echo "No changes to commit"
                                                                                                                                                                                              git push
                                                                                                                                                                                              
                                                                                                                                                                                              
